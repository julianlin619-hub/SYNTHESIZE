services:
  - type: web
    name: youtube-gpt-synthesizer-backend
    env: python
    plan: free
    buildCommand: pip install -r Backend/requirements.txt
    startCommand: cd Backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 600 --keep-alive 5 --max-requests 1000 --max-requests-jitter 100
    rootDir: .
    envVars:
      - key: SUPADATA_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production
      - key: FRONTEND_ORIGINS
        value: "https://synthesize-1.onrender.com"
    healthCheckPath: /health
    autoDeploy: true

  - type: web
    name: youtube-gpt-synthesizer-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_BACKEND_URL
        value: "https://synthesize-usq1.onrender.com"
    autoDeploy: true