<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        pre { background: #f8f9fa; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Comprehensive Backend Test</h1>
    
    <div class="test-section">
        <h3>Test 1: Simple GET Request</h3>
        <button onclick="testGet()">Test GET /</button>
        <div id="get-result"></div>
    </div>
    
    <div class="test-section">
        <h3>Test 2: POST Request (Same as Frontend)</h3>
        <button onclick="testPost()">Test POST /api/summarize</button>
        <div id="post-result"></div>
    </div>
    
    <div class="test-section">
        <h3>Test 3: CORS Preflight</h3>
        <button onclick="testCors()">Test CORS</button>
        <div id="cors-result"></div>
    </div>

    <script>
        async function testGet() {
            const resultDiv = document.getElementById('get-result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('https://youtube-gpt-synthesizer.onrender.com/');
                console.log('GET Response:', response.status, response.statusText);
                
                if (response.ok) {
                    const text = await response.text();
                    resultDiv.innerHTML = `<div class="success">✅ GET Success (${response.status})</div><pre>${text.substring(0, 200)}...</pre>`;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ GET Error ${response.status}: ${response.statusText}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ GET Network Error: ${error.message}</div>`;
            }
        }
        
        async function testPost() {
            const resultDiv = document.getElementById('post-result');
            resultDiv.innerHTML = 'Testing...';
            
            const testData = { url: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ' };
            console.log('📤 POST Request Data:', testData);
            
            try {
                const response = await fetch('https://youtube-gpt-synthesizer.onrender.com/api/summarize', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(testData)
                });
                
                console.log('📥 POST Response:', response.status, response.statusText);
                console.log('📥 POST Headers:', Object.fromEntries(response.headers.entries()));
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `<div class="success">✅ POST Success (${response.status})</div><pre>Summary length: ${data.summary.length} characters</pre>`;
                } else {
                    const errorText = await response.text();
                    resultDiv.innerHTML = `<div class="error">❌ POST Error ${response.status}: ${response.statusText}</div><pre>${errorText}</pre>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ POST Network Error: ${error.message}</div>`;
                console.error('POST Error:', error);
            }
        }
        
        async function testCors() {
            const resultDiv = document.getElementById('cors-result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                // Test OPTIONS request (CORS preflight)
                const response = await fetch('https://youtube-gpt-synthesizer.onrender.com/api/summarize', {
                    method: 'OPTIONS',
                    headers: {
                        'Origin': window.location.origin,
                        'Access-Control-Request-Method': 'POST',
                        'Access-Control-Request-Headers': 'Content-Type'
                    }
                });
                
                console.log('📥 CORS Response:', response.status, response.statusText);
                console.log('📥 CORS Headers:', Object.fromEntries(response.headers.entries()));
                
                if (response.ok) {
                    resultDiv.innerHTML = `<div class="success">✅ CORS Preflight Success (${response.status})</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ CORS Preflight Error ${response.status}: ${response.statusText}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ CORS Network Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
