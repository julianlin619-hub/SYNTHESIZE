<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Test</title>
</head>
<body>
    <h1>Debug Test</h1>
    <button onclick="testRequest()">Test Request</button>
    <div id="result"></div>

    <script>
        async function testRequest() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            const testData = {
                url: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'
            };
            
            console.log('📤 Sending request with data:', testData);
            
            try {
                const response = await fetch('https://youtube-gpt-synthesizer.onrender.com/api/summarize', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(testData)
                });
                
                console.log('📥 Response status:', response.status);
                console.log('📥 Response headers:', Object.fromEntries(response.headers.entries()));
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = '<h3>✅ Success!</h3><p>Backend is working correctly.</p>';
                    console.log('📄 Response data:', data);
                } else {
                    const errorText = await response.text();
                    resultDiv.innerHTML = `<h3>❌ Error ${response.status}</h3><p>${response.statusText}</p><pre>${errorText}</pre>`;
                    console.log('📄 Error response:', errorText);
                }
            } catch (error) {
                resultDiv.innerHTML = `<h3>❌ Network Error</h3><p>${error.message}</p>`;
                console.error('🌐 Network error:', error);
            }
        }
    </script>
</body>
</html>
